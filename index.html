<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DFA 組裝性檢查清單</title>
    <style>
        :root {
            --bg: #f4f4f2;
            --surface: #ffffff;
            --border: #d0d0cc;
            --border-light: #e8e8e4;
            --text: #1c1c1a;
            --muted: #888880;
            --label: #555550;
            --green-dark: #1a6038;
            --red-dark: #981825;
            --blue: #1a3e78;
            --sans: 'Calibri', 'Microsoft JhengHei', '微軟正黑體', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; }
        body {
            font-family: var(--sans);
            background-color: var(--bg);
            margin: 0; padding: 0;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }
        .sidebar-container { padding: 14px; max-width: 100%; }

        /* ── 頁首 ── */
        .header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-light);
            padding-bottom: 10px; margin-bottom: 12px;
        }
        .header-title { font-size: 15px; font-weight: 700; color: var(--text); margin: 0; letter-spacing: .03em; }
        .header-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; letter-spacing: .02em; }

        .reset-btn {
            font-size: 11.5px; font-weight: 500; font-family: var(--sans);
            background-color: var(--surface); border: 1px solid var(--border);
            color: var(--muted); padding: 4px 10px; border-radius: 7px;
            cursor: pointer; transition: all .15s;
        }
        .reset-btn:hover { border-color: var(--red-dark); color: var(--red-dark); background-color: #faeaec; }

        .pdf-btn {
            font-size: 11.5px; font-weight: 600; font-family: var(--sans);
            background-color: var(--text); border: 1px solid var(--text);
            color: #fff; padding: 4px 10px; border-radius: 7px;
            cursor: pointer; transition: opacity .15s; letter-spacing: .02em;
        }
        .pdf-btn:hover { opacity: .72; }

        /* ── Reset 確認框 ── */
        .confirm-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,.28); z-index: 999;
            align-items: center; justify-content: center;
        }
        .confirm-overlay.show { display: flex; }
        .confirm-box {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,.14);
            padding: 20px 22px; width: 260px;
            display: flex; flex-direction: column; gap: 14px;
        }
        .confirm-box p { font-size: 13px; font-weight: 600; margin: 0; }
        .confirm-box small { font-size: 11px; color: var(--muted); margin-top: -10px; }
        .confirm-btns { display: flex; gap: 8px; }
        .confirm-btns button {
            flex: 1; font-family: var(--sans); font-size: 12px; font-weight: 600;
            padding: 7px; border-radius: 7px; cursor: pointer; transition: all .15s;
        }
        .btn-confirm-ok {
            background: var(--red-dark); color: #fff;
            border: 1px solid var(--red-dark);
        }
        .btn-confirm-ok:hover { opacity: .82; }
        .btn-confirm-cancel {
            background: var(--surface); color: var(--muted);
            border: 1px solid var(--border);
        }
        .btn-confirm-cancel:hover { border-color: var(--text); color: var(--text); }

        /* ── A4 列印 ── */
        @media print {
            @page { size: A4 portrait; margin: 12mm 12mm 12mm 12mm; }
            body { background: #fff; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .sidebar-container { padding: 0; }
            .header { padding-bottom: 6px; margin-bottom: 8px; }
            .header-title { font-size: 13px; }
            .header-sub   { font-size: 9.5px; }
            .reset-btn, .pdf-btn, .confirm-overlay { display: none !important; }
            .progress-bar-wrap { margin-bottom: 8px; }
            .progress-info { font-size: 9.5px; }
            .progress-track { height: 4px; }
            .category-header { font-size: 10.5px; padding: 5px 9px; margin: 7px 0 4px; border-radius: 5px; }
            .checklist-wrapper { gap: 4px; }
            .checklist-item {
                padding: 6px 9px; border-radius: 8px;
                box-shadow: none !important;
                border: 1px solid var(--border-light) !important;
                page-break-inside: avoid;
            }
            .checkbox-box { width: 14px; height: 14px; border-radius: 3px; margin-top: 1px; flex-shrink: 0; }
            .checkbox-box::after { width: 3px; height: 6px; }
            .item-title { font-size: 10.5px !important; }
            .item-desc  { font-size: 9px !important; }
            .item-note input {
                font-size: 9px; padding: 2px 6px;
                border: 1px solid var(--border-light) !important;
                background: #fff !important;
            }
            [id^="cat"] { display: block !important; }
        }

        /* ── 進度列 ── */
        .progress-bar-wrap { margin-bottom: 14px; }
        .progress-info { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-bottom: 5px; }
        .progress-info b { color: var(--text); font-weight: 700; }
        .progress-track { height: 5px; background: var(--border-light); border-radius: 99px; overflow: hidden; }
        .progress-fill  { height: 100%; background: var(--text); border-radius: 99px; transition: width .3s; width: 0%; }

        /* ── 分類標題 ── */
        .category-header {
            background: var(--bg); border: 1px solid var(--border);
            padding: 7px 11px; border-radius: 7px;
            font-size: 12.5px; font-weight: 700; color: var(--label);
            margin: 10px 0 6px 0; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            letter-spacing: .04em; transition: all .15s;
        }
        .category-header:hover { border-color: var(--text); color: var(--text); }
        .category-header .arrow { color: var(--muted); font-size: 11px; transition: transform .15s; }

        /* ── Checklist 卡片 ── */
        .checklist-wrapper { display: flex; flex-direction: column; gap: 6px; }
        .checklist-item {
            background-color: var(--surface); padding: 10px 12px;
            border-radius: 12px; border: 1px solid var(--border-light);
            box-shadow: 0 2px 8px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
            display: flex; align-items: flex-start; gap: 12px;
            cursor: pointer; transition: border-color .15s; position: relative;
        }
        .checklist-item:hover { border-color: var(--border); }
        .checklist-item input[type="checkbox"] { position: absolute; opacity: 0; cursor: pointer; height: 0; width: 0; }

        .checkbox-box {
            width: 18px; height: 18px;
            border: 1.5px solid var(--border); border-radius: 5px;
            background-color: var(--surface); margin-top: 2px; flex-shrink: 0;
            transition: all .15s; display: flex; justify-content: center; align-items: center;
        }
        .checklist-item input:checked ~ .checkbox-box { background-color: var(--text); border-color: var(--text); }
        .checkbox-box::after {
            content: ''; display: none;
            width: 4px; height: 8px;
            border: solid var(--surface); border-width: 0 1.5px 1.5px 0;
            transform: rotate(45deg); margin-bottom: 1px;
        }
        .checklist-item input:checked ~ .checkbox-box::after { display: block; }

        .item-content { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 0; }
        .item-title   { font-size: 13px !important; font-weight: 600; color: var(--text); transition: color .15s; }
        .item-desc    { font-size: 11px !important; color: var(--muted); margin: 0; line-height: 1.5; }

        .checklist-item input:checked ~ .item-content .item-title { color: var(--muted); text-decoration: line-through; }
        .checklist-item input:checked ~ .item-content .item-desc  { color: var(--border); }

        /* ── 備註欄 ── */
        .item-note { margin-top: 5px; }
        .item-note input {
            font-family: var(--sans); font-size: 11px; width: 100%;
            border: 1px solid var(--border-light); border-radius: 6px;
            background: var(--bg); color: var(--label);
            padding: 4px 8px; outline: none; transition: border-color .15s;
        }
        .item-note input:hover  { border-color: var(--border); }
        .item-note input:focus  { border-color: var(--text); background: var(--surface); }
        .item-note input::placeholder { color: var(--border); }
    </style>
</head>
<body>
<div class="sidebar-container">

    <div class="header">
        <div>
            <h1 class="header-title">DFA 組裝性檢查清單</h1>
            <div class="header-sub">Design for Assembly — Review Checklist</div>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
            <button class="reset-btn" onclick="showConfirm()">重置</button>
            <button class="pdf-btn"   onclick="exportPDF()">匯出 PDF</button>
        </div>
    </div>

    <!-- 確認框 -->
    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-box">
            <p>清空所有勾選與備註？</p>
            <small>此動作無法還原</small>
            <div class="confirm-btns">
                <button class="btn-confirm-ok"     onclick="doReset()">清空</button>
                <button class="btn-confirm-cancel" onclick="hideConfirm()">取消</button>
            </div>
        </div>
    </div>

    <div class="progress-bar-wrap">
        <div class="progress-info"><span>完成進度</span><span><b id="prog-done">0</b> / <b>48</b></span></div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
    </div>

    <!-- 一、零件整合 -->
    <div class="category-header" onclick="toggleCat('cat1')">一、零件整合 <span class="arrow">▾</span></div>
    <div id="cat1"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c1"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">確認每個零件是否必要，相同功能盡量使用單一零件達成目的</span><div class="item-note"><input type="text" id="n1" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c2"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">單一零件是否可同時具有結構、導引、定位等多種功能</span><div class="item-note"><input type="text" id="n2" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c3"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">盡量採用市售標準件，減少客製零件種類</span><div class="item-note"><input type="text" id="n3" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c4"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">統一整機緊固件規格，減少換工具次數。(同一公稱直徑，使用相同長度、頭型、頭穴等)</span><div class="item-note"><input type="text" id="n4" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c5"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">零件所有功能能否一體成型，避免額外焊接、bonding或後加工製程</span><div class="item-note"><input type="text" id="n5" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c6"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">接地路徑是否能利用金屬件導通，減少額外接地線與端子</span><div class="item-note"><input type="text" id="n6" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 二、組裝 · 防呆 · 檢驗 -->
    <div class="category-header" onclick="toggleCat('cat2')">二、組裝 · 防呆 · 檢驗 <span class="arrow">▾</span></div>
    <div id="cat2"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c7"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">零件是否有導角、導引槽或錐面，讓組裝時自動對正</span><div class="item-note"><input type="text" id="n7" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c8"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">外形是否有必要設計成只能以正確方向安裝（非對稱設計），防止裝反</span><div class="item-note"><input type="text" id="n8" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c9"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">多件組裝後的累積公差是否在可接受範圍</span><div class="item-note"><input type="text" id="n9" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c10"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">Snap-fit 扣合是否有明顯的到位感，讓OP可確認</span><div class="item-note"><input type="text" id="n10" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c11"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">外觀相似但功能不同的零件，是否有顏色或刻字加以區別</span><div class="item-note"><input type="text" id="n11" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c12"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">connector選用是否有物理防呆（不對稱外形），確保無法插錯</span><div class="item-note"><input type="text" id="n12" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c13"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">盡量讓所有零件從同一方向裝入，避免上下翻轉產品</span><div class="item-note"><input type="text" id="n13" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c14"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">減少組裝過程需要旋轉的次數</span><div class="item-note"><input type="text" id="n14" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c15"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">避免需要先斜插再轉正的組配動作，改為直上直下</span><div class="item-note"><input type="text" id="n15" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c16"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">螺絲孔周圍是否有足夠空間讓工具垂直進入及取出</span><div class="item-note"><input type="text" id="n16" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c17"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">是否有零件需雙手同時扶持才能鎖螺絲，若有則增加定位夾持特徵</span><div class="item-note"><input type="text" id="n17" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c18"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">軟管、線材等難以定位的件，應排在組裝順序後段</span><div class="item-note"><input type="text" id="n18" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c19"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">組裝過程是否只需標準工具，無需客製專用工具</span><div class="item-note"><input type="text" id="n19" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c20"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">單站工時較高者，是否能以邊線預組</span><div class="item-note"><input type="text" id="n20" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c21"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">扣合點、螺絲是否能在組裝後目視確認到位，是否有空間劃記</span><div class="item-note"><input type="text" id="n21" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c22"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">序號、安規標籤的貼附位置是否平整、好貼(OP手能進入)</span><div class="item-note"><input type="text" id="n22" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c23"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">線束在蓋板蓋合前是否能清楚確認路徑正確、不會被夾到</span><div class="item-note"><input type="text" id="n23" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c24"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">最常需更換的消耗品是否可在不完全拆解下取出</span><div class="item-note"><input type="text" id="n24" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c25"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">若零件漏裝或裝反，是否能在下一工站目視或量測發現，避免往後流</span><div class="item-note"><input type="text" id="n25" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 三、夾持 · 搬運 · 治具 -->
    <div class="category-header" onclick="toggleCat('cat3')">三、夾持 · 搬運 · 治具 <span class="arrow">▾</span></div>
    <div id="cat3"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c26"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">小零件是否有平面或溝槽，讓鑷子或夾具穩定夾持</span><div class="item-note"><input type="text" id="n26" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c27"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">是否有定位特徵? 各工站定位點是否一致，避免每站重新對位</span><div class="item-note"><input type="text" id="n27" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c28"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">外觀件、busbar、電極在搬運時是否有臨時保護結構（凸耳、保護膜黏附面、防短路治具）</span><div class="item-note"><input type="text" id="n28" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c29"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">單人能否在不使用輔助工具下安全搬運次組件（建議 &lt; 15 kg）</span><div class="item-note"><input type="text" id="n29" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c30"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">涉及靜電敏感元件時，治具是否為導電或防靜電材質，並有接地設計</span><div class="item-note"><input type="text" id="n30" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c31"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">產品放在治具上時否有防呆設計或標示，避免放反導致撞機或報廢</span><div class="item-note"><input type="text" id="n31" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 四、自動化 -->
    <div class="category-header" onclick="toggleCat('cat4')">四、自動化 <span class="arrow">▾</span></div>
    <div id="cat4"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c32"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">薄片、橡膠、小型零件是否有防止疊放黏連的設計（導角、凸點）</span><div class="item-note"><input type="text" id="n32" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c33"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">螺絲頭型與鎖附角度是否與自動化設備相容</span><div class="item-note"><input type="text" id="n33" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c34"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">零件最小特徵尺寸是否在自動化設備可處理範圍內</span><div class="item-note"><input type="text" id="n34" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c35"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">點膠路徑是否為簡單直線或圓形，可由點膠機穩定執行，避免複雜曲線</span><div class="item-note"><input type="text" id="n35" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 五、模組化 -->
    <div class="category-header" onclick="toggleCat('cat5')">五、模組化 <span class="arrow">▾</span></div>
    <div id="cat5"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c36"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">每個次組件在組入整機前，是否能單獨進行功能測試（Hipot、氣密）</span><div class="item-note"><input type="text" id="n36" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c37"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">產品介面（吊掛結構、connector規格，水管接頭）是否統一，方便跨產品共用</span><div class="item-note"><input type="text" id="n37" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c38"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">次組件設計是否能跨產品共用，降低開發與庫存成本</span><div class="item-note"><input type="text" id="n38" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 六、表面處理 -->
    <div class="category-header" onclick="toggleCat('cat6')">六、表面處理 <span class="arrow">▾</span></div>
    <div id="cat6"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c39"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">ED、陽極處理等膜厚是否明確定義，鎖附孔是否遮蔽，避免組裝時剝落或卡死</span><div class="item-note"><input type="text" id="n39" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c40"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">塑膠件如有鎖附需求是否採用熱熔nut或insert nut，確保反覆拆裝強度</span><div class="item-note"><input type="text" id="n40" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c41"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">含磁鐵或導磁材料零件是否有保護措施，避免組裝中吸附異物或互相干擾</span><div class="item-note"><input type="text" id="n41" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c42"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">異種金屬接觸面（如鋁與不鏽鋼）是否設有絕緣墊片或表面處理，避免電位差腐蝕</span><div class="item-note"><input type="text" id="n42" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c43"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">需熱處理零件是否預先評估變形量並納入圖面公差，確保不影響後續組裝配合</span><div class="item-note"><input type="text" id="n43" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 七、成本與供應鏈 -->
    <div class="category-header" onclick="toggleCat('cat7')">七、成本與供應鏈 <span class="arrow">▾</span></div>
    <div id="cat7"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c44"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">零件或原料是否可從多家供應商採購避免壟斷或斷料風險</span><div class="item-note"><input type="text" id="n44" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

    <!-- 八、安全 -->
    <div class="category-header" onclick="toggleCat('cat8')">八、安全 <span class="arrow">▾</span></div>
    <div id="cat8"><div class="checklist-wrapper">
        <label class="checklist-item"><input type="checkbox" id="c45"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">鈑金件、鑄件是否有在圖面標注去毛邊要求且設計上無直角利邊，避免割傷OP</span><div class="item-note"><input type="text" id="n45" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c46"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">塑膠件是否有標注材料，方便產品結束後分類回收</span><div class="item-note"><input type="text" id="n46" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c47"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">組裝動作是否避免持續施力、高頻扭轉等易造成職業性重複傷害（RSI）的動作設計</span><div class="item-note"><input type="text" id="n47" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
        <label class="checklist-item"><input type="checkbox" id="c48"><div class="checkbox-box"></div><div class="item-content"><span class="item-title">線束、接合面、動件是否有良好固定及足夠的周邊淨空，避免使用期間鬆動產生異音或功能失效</span><div class="item-note"><input type="text" id="n48" placeholder="備註…" onclick="event.stopPropagation()"></div></div></label>
    </div></div>

</div>
<script>
    const TOTAL = 48;

    function getCheckboxes()  { return document.querySelectorAll('input[type="checkbox"]'); }
    function getNoteInputs()  { return document.querySelectorAll('.item-note input'); }

    // ── 載入 ──
    document.addEventListener('DOMContentLoaded', () => {
        getCheckboxes().forEach(b => {
            if (localStorage.getItem(b.id) === 'true') b.checked = true;
            b.addEventListener('change', () => { localStorage.setItem(b.id, b.checked); updateProgress(); });
        });
        getNoteInputs().forEach(i => {
            const v = localStorage.getItem(i.id);
            if (v) i.value = v;
            i.addEventListener('input', () => localStorage.setItem(i.id, i.value));
        });
        updateProgress();
    });

    // ── 進度 ──
    function updateProgress() {
        const all  = getCheckboxes();
        const done = [...all].filter(b => b.checked).length;
        document.getElementById('prog-done').textContent = done;
        document.getElementById('prog-fill').style.width = (done / TOTAL * 100) + '%';
    }

    // ── 重置 ──
    function showConfirm()  { document.getElementById('confirm-overlay').classList.add('show'); }
    function hideConfirm()  { document.getElementById('confirm-overlay').classList.remove('show'); }
    function doReset() {
        getCheckboxes().forEach(b => { b.checked = false; localStorage.removeItem(b.id); });
        getNoteInputs().forEach(i => { i.value = '';      localStorage.removeItem(i.id); });
        updateProgress();
        hideConfirm();
    }

    // ── 分類折疊 ──
    function toggleCat(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'none') ? 'block' : 'none';
    }

    // ── PDF 匯出（A4 直式） ──
    async function exportPDF() {
        const btn = document.querySelector('.pdf-btn');
        btn.textContent = '產生中…';
        btn.disabled = true;

        // 強制展開所有分類
        const cats = ['cat1','cat2','cat3','cat4','cat5','cat6','cat7','cat8'];
        const prevDisplay = cats.map(id => document.getElementById(id).style.display);
        cats.forEach(id => { document.getElementById(id).style.display = 'block'; });

        await new Promise(r => setTimeout(r, 80));

        const el = document.querySelector('.sidebar-container');
        const CAPTURE_W = 794; // A4 @ 96dpi

        const savedW = el.style.width;
        el.style.width = CAPTURE_W + 'px';
        await new Promise(r => setTimeout(r, 60));

        const canvas = await html2canvas(el, {
            scale: 2, useCORS: true,
            backgroundColor: '#f4f4f2',
            width: CAPTURE_W, windowWidth: CAPTURE_W,
            height: el.scrollHeight, windowHeight: el.scrollHeight,
        });

        el.style.width = savedW;
        cats.forEach((id, i) => { document.getElementById(id).style.display = prevDisplay[i]; });

        // A4 直式: 210 × 297mm
        const { jsPDF } = window.jspdf;
        const pdfW = 210;
        const pdfH = Math.round(canvas.height / canvas.width * pdfW);
        const pdf  = new jsPDF({ orientation: 'portrait', unit: 'mm', format: [pdfW, pdfH] });
        pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, pdfW, pdfH);
        pdf.save('DFA_檢查清單.pdf');

        btn.textContent = '匯出 PDF';
        btn.disabled = false;
    }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
